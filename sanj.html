<!DOCTYPE html>
<html>
<head>
    <title>Hacker Welcome</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            color: #00ff00;
            font-family: "Courier New", monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        #text {
            font-size: 40px;
            border-right: 3px solid #00ff00;
            white-space: nowrap;
            overflow: hidden;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        .sub-text {
            margin-top: 20px;
            font-size: 18px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="text"></div>
    <div class="sub-text">System Access Granted ✔</div>
</div>

<script>
    var message = "Hello Sanjay 😎";
    var i = 0;

    function typeEffect() {
        if (i < message.length) {
            document.getElementById("text").innerHTML += message.charAt(i);
            i++;
            setTimeout(typeEffect, 100);
        }
    }

    typeEffect();
</script>

</body>
</html>
